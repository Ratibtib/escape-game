name: Build & Deploy

on:
  push:
    branches: [main]      # ← mets "master" ici si ta branche s'appelle master
  workflow_dispatch:       # ← permet aussi de lancer le build à la main depuis l'onglet Actions

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Génère le dossier docs/
      # ⚠ Si build.mjs n'est PAS à la racine du repo mais dans un sous-dossier
      #   (ex: escape-engine/build.mjs), remplace la ligne ci-dessous par :
      #   run: cd escape-engine && node build.mjs
      - name: Build
        run: node build.mjs

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          # ⚠ Si build.mjs est dans un sous-dossier, mets ici : escape-engine/docs
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

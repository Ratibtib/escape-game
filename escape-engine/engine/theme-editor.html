<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thèmes — maquette</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Playfair+Display:wght@600;700&family=Poppins:wght@400;500;600&family=Bebas+Neue&family=Caveat:wght@600;700&family=Inter:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0a0f;--bg2:#101019;--card:#15151f;--card2:#1b1b27;
    --border:#262635;--border-bright:#33334a;
    --text:#e9e9f2;--dim:#8a8aa0;--faint:#5a5a70;
    --accent:#00e0d0;--accent-dim:rgba(0,224,208,.14);--accent-glow:rgba(0,224,208,.35);
    --danger:#ff4d6d;--danger-dim:rgba(255,77,109,.14);--ok:#39d98a;
    --mono:ui-monospace,"Space Mono",Menlo,monospace;--sans:system-ui,-apple-system,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select{font-family:inherit}
  .mono{font-family:var(--mono)}

  header.top{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:14px;padding:11px 20px;background:rgba(10,10,15,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent-glow);animation:pulse 2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .brand .nm{font-family:var(--mono);font-size:.72rem;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
  .brand .sub{font-family:var(--mono);font-size:.6rem;color:var(--faint);letter-spacing:1px}
  .tabs{display:flex;gap:4px;margin-left:18px}
  .tabs button{padding:8px 15px;border-radius:8px;font-size:.76rem;font-weight:600;color:var(--dim)}
  .tabs button.active{background:var(--card);color:var(--accent);border:1px solid var(--border-bright)}
  .top .spacer{flex:1}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:8px;font-size:.74rem;font-weight:600;letter-spacing:.3px;border:1px solid var(--border-bright);background:var(--card);color:var(--text);transition:.15s}
  .btn:hover{border-color:var(--accent);color:var(--accent)}
  .btn.primary{background:var(--accent);color:#04140f;border-color:var(--accent)}
  .btn.primary:hover{filter:brightness(1.1);color:#04140f}
  .btn.sm{padding:5px 10px;font-size:.68rem}
  .btn.ghost{background:transparent}
  .btn.danger:hover{border-color:var(--danger);color:var(--danger)}
  .btn[disabled]{opacity:.4;cursor:default}

  .view{display:none}
  .view.active{display:block}

  /* ── ÉDITEUR ── */
  .shell{display:grid;grid-template-columns:340px 1fr;min-height:calc(100vh - 50px)}
  @media(max-width:880px){.shell{grid-template-columns:1fr}}
  aside{border-right:1px solid var(--border);background:var(--bg2);overflow-y:auto;max-height:calc(100vh - 50px)}
  @media(max-width:880px){aside{max-height:none;border-right:none;border-bottom:1px solid var(--border)}}
  .ed-head{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
  .ed-head .nm{flex:1;min-width:0}
  .ed-head .nm .t{font-size:.9rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ed-head .nm .s{font-family:var(--mono);font-size:.58rem;color:var(--faint);letter-spacing:.5px}
  .dirty-dot{width:7px;height:7px;border-radius:50%;background:var(--danger);flex-shrink:0;display:none}
  .dirty .dirty-dot{display:block}
  .sec{padding:16px 18px;border-bottom:1px solid var(--border)}
  .sec h3{font-family:var(--mono);font-size:.62rem;letter-spacing:1.5px;text-transform:uppercase;color:var(--faint);margin-bottom:13px}
  .crow{display:flex;align-items:center;gap:10px;margin-bottom:9px}
  .crow label{flex:1;font-size:.76rem;color:var(--dim)}
  .crow .swatch{width:30px;height:30px;border-radius:7px;border:1px solid var(--border-bright);overflow:hidden;position:relative;flex-shrink:0}
  .crow .swatch input[type=color]{position:absolute;inset:-4px;width:calc(100% + 8px);height:calc(100% + 8px);border:none;padding:0;cursor:pointer;background:none}
  .crow input.hex{width:88px;background:var(--card);border:1px solid var(--border);border-radius:7px;color:var(--text);padding:6px 8px;font-family:var(--mono);font-size:.72rem;text-transform:uppercase}
  .crow input.hex:focus{outline:none;border-color:var(--accent)}
  .field{margin-bottom:12px}
  .field>label{display:block;font-size:.72rem;color:var(--dim);margin-bottom:6px}
  .sel{width:100%;background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 11px;font-size:.78rem}
  .sel:focus{outline:none;border-color:var(--accent)}
  .range{display:flex;align-items:center;gap:11px}
  .range input[type=range]{flex:1;accent-color:var(--accent)}
  .range .val{font-family:var(--mono);font-size:.72rem;color:var(--accent);width:42px;text-align:right}
  .toggle{display:flex;align-items:center;gap:9px;cursor:pointer}
  .toggle input{width:16px;height:16px;accent-color:var(--accent)}
  .toggle span{font-size:.78rem}
  .contrast{display:flex;align-items:center;gap:9px;font-size:.72rem;color:var(--dim);margin-top:4px}
  .pill{font-family:var(--mono);font-size:.6rem;padding:2px 7px;border-radius:5px;font-weight:700}
  .pill.ok{background:rgba(57,217,138,.16);color:#39d98a}
  .pill.warn{background:rgba(255,176,32,.16);color:#ffb020}
  .pill.bad{background:rgba(255,77,109,.16);color:#ff4d6d}

  main{overflow-y:auto;max-height:calc(100vh - 50px);background:radial-gradient(700px 400px at 50% -10%, rgba(255,255,255,.03), transparent 60%);display:flex;flex-direction:column;align-items:center;padding:24px 20px 60px}
  .stage-tabs{display:flex;gap:6px;margin-bottom:18px;background:var(--card);padding:5px;border-radius:10px;border:1px solid var(--border)}
  .stage-tabs button{padding:7px 14px;border-radius:7px;font-size:.74rem;color:var(--dim);font-weight:600}
  .stage-tabs button.active{background:var(--accent);color:#04140f}
  .phone{width:340px;max-width:92vw;border-radius:36px;border:1px solid var(--border-bright);background:#000;padding:11px;box-shadow:0 30px 80px rgba(0,0,0,.55)}
  .screen{border-radius:26px;overflow:hidden;height:600px;background:var(--t-bg);color:var(--t-text);font-family:var(--t-body);display:flex;flex-direction:column}
  .scr-pad{padding:30px 22px;flex:1;overflow-y:auto;display:flex;flex-direction:column}
  .pv-classified{font-family:var(--t-mono);font-size:.6rem;letter-spacing:2px;color:var(--t-danger);text-align:center;margin-bottom:auto;opacity:.85}
  .pv-logo{font-family:var(--t-display);font-size:2.3rem;font-weight:700;color:var(--t-accent);text-align:center;line-height:1.05;letter-spacing:1px;text-shadow:var(--t-glow);margin-bottom:10px}
  .pv-subtitle{font-size:.86rem;color:var(--t-dim);text-align:center;margin-bottom:26px}
  .pv-codename{font-family:var(--t-mono);font-size:.64rem;letter-spacing:2px;color:var(--t-accent);text-align:center;margin:auto 0 26px}
  .pv-cta{background:var(--t-accent);color:var(--t-bg);font-weight:700;font-size:.92rem;border-radius:var(--t-radius);padding:14px;text-align:center;letter-spacing:.5px;box-shadow:var(--t-glow-btn)}
  .pv-tag{display:inline-block;font-family:var(--t-mono);font-size:.56rem;letter-spacing:1px;text-transform:uppercase;color:var(--t-accent);background:var(--t-accent-dim);padding:3px 8px;border-radius:5px;margin-bottom:14px}
  .pv-narr{font-family:var(--t-mono);font-size:.66rem;letter-spacing:.5px;color:var(--t-accent);line-height:1.5;margin-bottom:18px;opacity:.92}
  .pv-q{font-size:1.02rem;line-height:1.5;margin-bottom:22px;color:var(--t-text)}
  .pv-input{background:var(--t-card);border:1px solid var(--t-border);border-radius:var(--t-radius);padding:13px 15px;color:var(--t-dim);font-family:var(--t-mono);font-size:.82rem;margin-bottom:13px}
  .pv-valider{background:var(--t-accent);color:var(--t-bg);font-weight:700;border-radius:var(--t-radius);padding:13px;text-align:center;font-size:.88rem;box-shadow:var(--t-glow-btn)}
  .pv-hint{margin-top:18px;padding:11px 13px;border:1px dashed var(--t-border);border-radius:var(--t-radius);font-size:.78rem;color:var(--t-hint);background:rgba(255,255,255,.02)}
  .pv-ok-wrap{margin:auto;text-align:center}
  .pv-badge{width:74px;height:74px;border-radius:50%;background:var(--t-ok);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:2rem;color:var(--t-bg)}
  .pv-ok-title{font-family:var(--t-display);font-size:1.7rem;color:var(--t-ok);margin-bottom:8px}
  .pv-ok-sub{font-size:.86rem;color:var(--t-dim);margin-bottom:26px}
  .pv-hub{display:grid;grid-template-columns:1fr 1fr;gap:11px;width:100%}
  .pv-tile{background:var(--t-card);border:1px solid var(--t-border);border-radius:var(--t-radius);padding:15px;text-align:left}
  .pv-tile .n{font-family:var(--t-mono);font-size:1.3rem;color:var(--t-accent);font-weight:700}
  .pv-tile .l{font-size:.66rem;color:var(--t-dim);margin-top:4px}

  /* ── BIBLIOTHÈQUE & JEUX ── */
  .page{max-width:920px;margin:0 auto;padding:30px 24px 70px}
  .page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:24px;flex-wrap:wrap}
  .page-head h2{font-size:1.4rem}
  .page-head .eyebrow{font-family:var(--mono);font-size:.6rem;letter-spacing:2px;text-transform:uppercase;color:var(--faint);margin-bottom:7px}
  .page-head p{color:var(--dim);font-size:.84rem;margin-top:6px;max-width:520px;line-height:1.5}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:15px}
  .tcard{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:.18s}
  .tcard:hover{border-color:var(--border-bright);transform:translateY(-2px)}
  .tcard .demo{height:88px;display:flex;align-items:center;justify-content:center;position:relative}
  .tcard .demo .lg{font-weight:700;font-size:1.1rem;letter-spacing:.5px}
  .tcard .demo .chip{position:absolute;bottom:8px;right:8px;font-size:.5rem;font-family:var(--mono);padding:2px 6px;border-radius:4px}
  .tcard .body{padding:13px}
  .tcard .body .nm{font-size:.86rem;font-weight:600;margin-bottom:9px}
  .tcard .body .sw{display:flex;gap:3px;margin-bottom:12px}
  .tcard .body .sw i{width:100%;height:11px;border-radius:2px}
  .tcard .acts{display:flex;gap:6px;flex-wrap:wrap}
  .new-tcard{border:1.5px dashed var(--border-bright);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:200px;color:var(--dim);cursor:pointer;transition:.18s}
  .new-tcard:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
  .new-tcard .p{font-size:2rem}

  .grow{display:flex;align-items:center;gap:16px;background:var(--card);border:1px solid var(--border);border-radius:13px;padding:15px 17px;margin-bottom:12px;flex-wrap:wrap}
  .grow .ginfo{flex:1;min-width:160px}
  .grow .ginfo .t{font-size:.95rem;font-weight:600}
  .grow .ginfo .c{font-family:var(--mono);font-size:.62rem;color:var(--dim);margin-top:2px}
  .grow .miniprev{display:flex;gap:3px;width:90px;flex-shrink:0}
  .grow .miniprev i{width:100%;height:26px;border-radius:4px}
  .grow .assign{display:flex;align-items:center;gap:9px}
  .grow .assign select{background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 11px;font-size:.78rem;min-width:150px}

  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(5,5,9,.7);backdrop-filter:blur(3px);z-index:60;display:none;align-items:center;justify-content:center;padding:20px}
  .scrim.show{display:flex}
  .modal{background:var(--card);border:1px solid var(--border-bright);border-radius:16px;padding:23px;max-width:400px;width:100%}
  .modal h3{font-size:1.02rem;margin-bottom:14px}
  .modal input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:.85rem;margin-bottom:16px}
  .modal input:focus{outline:none;border-color:var(--accent)}
  .modal .acts{display:flex;gap:9px;justify-content:flex-end}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--accent);color:var(--text);padding:11px 18px;border-radius:9px;font-size:.78rem;font-weight:600;opacity:0;transition:.25s;z-index:70}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<header class="top">
  <div class="brand"><span class="dot"></span>
    <div><div class="nm">Thèmes</div><div class="sub mono">bibliothèque · themes.json</div></div>
  </div>
  <div class="tabs">
    <button class="active" data-v="editor" onclick="setView('editor')">Éditeur</button>
    <button data-v="library" onclick="setView('library')">Bibliothèque</button>
  </div>
  <div class="spacer"></div>
  <button class="btn ghost sm" onclick="document.getElementById('importer').click()">⇪ Importer</button>
  <button class="btn primary sm" onclick="exportLibrary()">⇩ Exporter themes.json</button>
  <button class="btn ghost sm" onclick="resetDemo()">↺ Réinitialiser</button>
  <input type="file" id="importer" accept="application/json,.json" style="display:none" onchange="importLibrary(event)">
</header>

<!-- ÉDITEUR -->
<div class="view active" id="view-editor">
  <div class="shell">
    <aside>
      <div class="ed-head dirty" id="ed-head">
        <span class="dirty-dot" title="modifications non enregistrées"></span>
        <div class="nm"><div class="t" id="cur-name">—</div><div class="s">thème en cours d'édition</div></div>
        <button class="btn primary sm" onclick="saveCurrent()">Enregistrer</button>
      </div>
      <div class="sec">
        <h3>Couleurs</h3>
        <div id="colors"></div>
        <div class="contrast" id="contrast"></div>
      </div>
      <div class="sec">
        <h3>Typographie</h3>
        <div class="field"><label>Police des titres / logo</label><select class="sel" id="font-display" onchange="setFont('display',this.value)"></select></div>
        <div class="field"><label>Police du texte</label><select class="sel" id="font-body" onchange="setFont('body',this.value)"></select></div>
        <div class="field"><label>Police technique (mono)</label><select class="sel" id="font-mono" onchange="setFont('mono',this.value)"></select></div>
      </div>
      <div class="sec">
        <h3>Forme & effets</h3>
        <div class="field"><label>Arrondi des éléments</label>
          <div class="range"><input type="range" id="radius" min="0" max="28" value="12" oninput="setRadius(this.value)"><span class="val" id="radius-val">12px</span></div>
        </div>
        <label class="toggle"><input type="checkbox" id="glow" onchange="setGlow(this.checked)"><span>Halo lumineux sur l'accent</span></label>
      </div>
      <div class="sec">
        <button class="btn ghost sm" onclick="saveAsNew()">Enregistrer comme nouveau</button>
      </div>
    </aside>
    <main>
      <div class="stage-tabs">
        <button class="active" data-s="accueil" onclick="setScreen('accueil')">Accueil</button>
        <button data-s="enigme" onclick="setScreen('enigme')">Énigme</button>
        <button data-s="valide" onclick="setScreen('valide')">Validé</button>
      </div>
      <div class="phone"><div class="screen" id="stage"><div class="scr-pad" id="scr"></div></div></div>
    </main>
  </div>
</div>

<!-- BIBLIOTHÈQUE -->
<div class="view" id="view-library">
  <div class="page">
    <div class="page-head">
      <div><div class="eyebrow">Bibliothèque</div><h2>Mes thèmes</h2>
        <p>Des identités visuelles réutilisables, indépendantes des jeux. Édite, duplique, puis affecte-les dans l'onglet « Jeux ».</p></div>
    </div>
    <div class="grid" id="lib-grid"></div>
  </div>
</div>

<!-- modal renommer / nouveau -->
<div class="scrim" id="scrim">
  <div class="modal">
    <h3 id="m-title">Renommer</h3>
    <input id="m-name" placeholder="Nom du thème">
    <div class="acts">
      <button class="btn ghost sm" onclick="closeModal()">Annuler</button>
      <button class="btn primary sm" id="m-ok" onclick="confirmModal()">OK</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const FONTS = {
  "Système":"system-ui, -apple-system, 'Segoe UI', sans-serif",
  "Inter":"'Inter', system-ui, sans-serif",
  "Poppins":"'Poppins', system-ui, sans-serif",
  "Orbitron (techno)":"'Orbitron', system-ui, sans-serif",
  "Bebas Neue (impact)":"'Bebas Neue', system-ui, sans-serif",
  "Playfair (élégant)":"'Playfair Display', Georgia, serif",
  "Caveat (manuscrit)":"'Caveat', cursive",
  "Space Mono":"'Space Mono', ui-monospace, monospace",
  "Mono système":"ui-monospace, Menlo, Consolas, monospace",
};
const PRESETS = {
  "1986 / Cyber":{colors:{bg:"#0a0a0f",card:"#15151f",border:"#262635",text:"#e9e9f2",dim:"#8a8aa0",accent:"#00e0d0",hint:"#ffb020",ok:"#39d98a",danger:"#ff4d6d"},fonts:{display:"Orbitron (techno)",body:"Inter",mono:"Space Mono"},radius:12,glow:true},
  "Mariage":{colors:{bg:"#fdf6f0",card:"#ffffff",border:"#ecdcd6",text:"#3a2e2e",dim:"#9b8b85",accent:"#d98aa0",hint:"#c9a227",ok:"#6bbf8a",danger:"#e06a6a"},fonts:{display:"Playfair (élégant)",body:"Poppins",mono:"Mono système"},radius:18,glow:false},
  "Entreprise":{colors:{bg:"#0f1620",card:"#16202c",border:"#243443",text:"#e8eef5",dim:"#8aa0b5",accent:"#3d9be0",hint:"#e0a93d",ok:"#3dd9a0",danger:"#e06a6a"},fonts:{display:"Poppins",body:"Inter",mono:"Space Mono"},radius:8,glow:false},
  "Anniversaire":{colors:{bg:"#140a1a",card:"#1f1030",border:"#34204a",text:"#f5e9ff",dim:"#b59ac9",accent:"#ff3d7f",hint:"#ffd23d",ok:"#3dff9e",danger:"#ff5050"},fonts:{display:"Bebas Neue (impact)",body:"Poppins",mono:"Space Mono"},radius:16,glow:true},
  "Aventure / Forêt":{colors:{bg:"#0c140f",card:"#14201a",border:"#243a2e",text:"#e9f5ec",dim:"#8ab59a",accent:"#4fd98a",hint:"#e0c03d",ok:"#4fd98a",danger:"#e0703d"},fonts:{display:"Playfair (élégant)",body:"Inter",mono:"Mono système"},radius:12,glow:false},
};
const COLOR_LABELS={bg:"Fond",card:"Cartes / champs",border:"Bordures",text:"Texte",dim:"Texte atténué",accent:"Accent (principal)",hint:"Indices",ok:"Validation",danger:"Confidentiel / erreur"};
const LS_LIB="theme_lib_v1";

let LIB=[];               // [{id,name,colors,fonts,radius,glow}]
let cur=null;             // thème en cours (objet)
let curId=null;           // id du thème édité (null = brouillon non enregistré)
let dirty=false;
let screen="accueil", view="editor";
let modalMode="rename", modalTarget=null;

function clone(o){return JSON.parse(JSON.stringify(o));}
function slug(s){return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^\w]+/g,'-').replace(/^-|-$/g,'')||'theme';}
function uid(base){let b=slug(base),i=1,id=b;while(LIB.some(t=>t.id===id)){id=b+'-'+(++i);}return id;}

// ── persistance ──
async function load(){
  // 1) themes.json servi à côté (source de vérité en ligne)
  try{ const r=await fetch('./themes.json',{cache:'no-cache'}); if(r.ok){ const lib=await r.json(); if(Array.isArray(lib.themes)&&lib.themes.length){ LIB=lib.themes; persist(); return; } } }catch(e){}
  // 2) brouillon local
  try{LIB=JSON.parse(localStorage.getItem(LS_LIB))||[];}catch(e){LIB=[];}
  // 3) jeu de départ
  if(!LIB.length) seed();
}
function seed(){
  LIB=Object.entries(PRESETS).map(([name,p])=>({id:slug(name),name,...clone(p)}));
  persist();
}
function persist(){try{localStorage.setItem(LS_LIB,JSON.stringify(LIB));}catch(e){}}
function themeById(id){return LIB.find(t=>t.id===id)||null;}

// ── éditeur ──
function loadIntoEditor(id){
  const t=themeById(id);
  cur=t?clone(t):clone({name:"Nouveau thème",...defaultTheme()});
  curId=t?id:null; dirty=false;
  buildColors();buildFonts();syncShape();applyTheme();renderEditorHead();
}
function defaultTheme(){return clone(PRESETS["1986 / Cyber"]);}
function newTheme(){
  cur=clone(defaultTheme()); cur.name="Nouveau thème"; curId=null; dirty=true;
  setView('editor'); buildColors();buildFonts();syncShape();applyTheme();renderEditorHead();
  toast("Nouveau thème — règle puis Enregistre");
}
function renderEditorHead(){
  document.getElementById('cur-name').textContent=cur.name+(curId?'':' (non enregistré)');
  document.getElementById('ed-head').classList.toggle('dirty',dirty||!curId);
}
function markDirty(){dirty=true;renderEditorHead();}

function saveCurrent(){
  if(curId){ const t=themeById(curId); Object.assign(t,clone(cur),{id:curId,name:cur.name}); }
  else { curId=uid(cur.name); LIB.push({id:curId,...clone(cur)}); }
  dirty=false; persist(); renderEditorHead(); buildLibrary();
  toast("Thème enregistré dans la bibliothèque");
}
function saveAsNew(){
  modalMode="saveas"; document.getElementById('m-title').textContent="Enregistrer comme nouveau";
  document.getElementById('m-name').value=(cur.name||'Thème')+" (copie)";
  document.getElementById('m-ok').textContent="Enregistrer"; openModal();
}

// ── contrôles ──
function buildColors(){
  document.getElementById('colors').innerHTML=Object.keys(COLOR_LABELS).map(k=>`
    <div class="crow"><span class="swatch"><input type="color" value="${cur.colors[k]}" oninput="setColor('${k}',this.value)"></span>
      <label>${COLOR_LABELS[k]}</label>
      <input class="hex" value="${cur.colors[k]}" oninput="setColorHex('${k}',this.value)"></div>`).join('');
}
function buildFonts(){['display','body','mono'].forEach(s=>{document.getElementById('font-'+s).innerHTML=Object.keys(FONTS).map(n=>`<option value="${n}" ${cur.fonts[s]===n?'selected':''}>${n}</option>`).join('');});}
function syncShape(){document.getElementById('radius').value=cur.radius;document.getElementById('radius-val').textContent=cur.radius+'px';document.getElementById('glow').checked=cur.glow;}
function setColor(k,v){cur.colors[k]=v;syncHex(k,v);markDirty();applyTheme();}
function setColorHex(k,v){v=v.trim();if(!/^#?[0-9a-fA-F]{3,8}$/.test(v)){return;}if(v[0]!=='#')v='#'+v;cur.colors[k]=v;syncSwatch(k,v);markDirty();applyTheme();}
function syncHex(k,v){const r=document.querySelectorAll('#colors .crow')[Object.keys(COLOR_LABELS).indexOf(k)];if(r)r.querySelector('.hex').value=v;}
function syncSwatch(k,v){const r=document.querySelectorAll('#colors .crow')[Object.keys(COLOR_LABELS).indexOf(k)];if(r)r.querySelector('input[type=color]').value=v;}
function setFont(s,v){cur.fonts[s]=v;markDirty();applyTheme();}
function setRadius(v){cur.radius=+v;document.getElementById('radius-val').textContent=v+'px';markDirty();applyTheme();}
function setGlow(v){cur.glow=v;markDirty();applyTheme();}

function setScreen(s){screen=s;document.querySelectorAll('.stage-tabs button').forEach(b=>b.classList.toggle('active',b.dataset.s===s));renderScreen();}
function applyTheme(){
  const st=document.getElementById('stage'),c=cur.colors,set=(k,v)=>st.style.setProperty(k,v);
  set('--t-bg',c.bg);set('--t-card',c.card);set('--t-border',c.border);set('--t-text',c.text);set('--t-dim',c.dim);
  set('--t-accent',c.accent);set('--t-hint',c.hint);set('--t-ok',c.ok);set('--t-danger',c.danger);set('--t-accent-dim',hexA(c.accent,.16));
  set('--t-display',FONTS[cur.fonts.display]);set('--t-body',FONTS[cur.fonts.body]);set('--t-mono',FONTS[cur.fonts.mono]);
  set('--t-radius',cur.radius+'px');
  set('--t-glow',cur.glow?`0 0 24px ${hexA(c.accent,.45)}`:'none');
  set('--t-glow-btn',cur.glow?`0 6px 22px ${hexA(c.accent,.4)}`:'none');
  updateContrast();
}
function renderScreen(){
  const scr=document.getElementById('scr');
  if(screen==='accueil') scr.innerHTML=`<div class="pv-classified">/// CONFIDENTIEL ///</div><div class="pv-logo">PROJET 1986</div><div class="pv-subtitle">Système de réactivation</div><div class="pv-codename">/// 40 ÉPREUVES VOUS ATTENDENT ///</div><div class="pv-cta">▶ DÉMARRER LA MISSION</div>`;
  else if(screen==='enigme') scr.innerHTML=`<span class="pv-tag">Acte II · Énigme 14</span><div class="pv-narr">> Le signal faiblit. Décode la fréquence avant qu'il ne disparaisse…</div><div class="pv-q">Quel mot devient plus court quand on lui ajoute deux lettres ?</div><div class="pv-input">Ta réponse…</div><div class="pv-valider">Valider</div><div class="pv-hint">💡 Pense à une notion de longueur… qui se nie elle-même.</div>`;
  else scr.innerHTML=`<div class="pv-ok-wrap"><div class="pv-badge">✓</div><div class="pv-ok-title">Bravo !</div><div class="pv-ok-sub">Énigme résolue — la suite se déverrouille.</div><div class="pv-hub"><div class="pv-tile"><div class="n">12</div><div class="l">RÉSOLUES</div></div><div class="pv-tile"><div class="n">28</div><div class="l">RESTANTES</div></div></div></div>`;
}
function updateContrast(){
  const r=contrast(cur.colors.text,cur.colors.bg);let cls='bad',t='illisible';
  if(r>=7){cls='ok';t='excellent';}else if(r>=4.5){cls='ok';t='bon';}else if(r>=3){cls='warn';t='limite';}
  document.getElementById('contrast').innerHTML=`Lisibilité texte / fond : <span class="pill ${cls}">${r.toFixed(1)}:1 · ${t}</span>`;
}
function lum(hex){const c=hexToRgb(hex).map(v=>{v/=255;return v<=.03928?v/12.92:Math.pow((v+.055)/1.055,2.4);});return .2126*c[0]+.7152*c[1]+.0722*c[2];}
function contrast(a,b){const l1=lum(a),l2=lum(b);return(Math.max(l1,l2)+.05)/(Math.min(l1,l2)+.05);}
function hexToRgb(h){h=h.replace('#','');if(h.length===3)h=h.split('').map(x=>x+x).join('');return[0,2,4].map(i=>parseInt(h.slice(i,i+2),16));}
function hexA(h,a){const[r,g,b]=hexToRgb(h);return`rgba(${r},${g},${b},${a})`;}

// ── bibliothèque ──
function buildLibrary(){
  const g=document.getElementById('lib-grid');
  let h=`<div class="new-tcard" onclick="newTheme()"><div class="p">+</div><div>Nouveau thème</div></div>`;
  LIB.forEach(t=>{
    const c=t.colors;
    h+=`<div class="tcard">
      <div class="demo" style="background:${c.bg};font-family:${FONTS[t.fonts.display]}">
        <span class="lg" style="color:${c.accent};text-shadow:${t.glow?'0 0 14px '+hexA(c.accent,.5):'none'}">PROJET</span>
        <span class="chip" style="background:${hexA(c.accent,.18)};color:${c.accent}">Aa</span>
      </div>
      <div class="body">
        <div class="nm">${esc(t.name)}</div>
        <div class="sw"><i style="background:${c.bg}"></i><i style="background:${c.card}"></i><i style="background:${c.accent}"></i><i style="background:${c.text}"></i><i style="background:${c.hint}"></i></div>
        <div class="acts">
          <button class="btn primary sm" onclick="editTheme('${t.id}')">✎ Éditer</button>
          <button class="btn sm" onclick="dupTheme('${t.id}')">⧉</button>
          <button class="btn sm" onclick="renameTheme('${t.id}')">✐</button>
          <button class="btn ghost sm danger" onclick="delTheme('${t.id}')">🗑</button>
        </div>
      </div></div>`;
  });
  g.innerHTML=h;
}
function editTheme(id){loadIntoEditor(id);setView('editor');}
function dupTheme(id){const t=themeById(id);const c={...clone(t),id:uid(t.name),name:t.name+" (copie)"};LIB.push(c);persist();buildLibrary();toast("Thème dupliqué");}
function delTheme(id){
  if(!confirm("Supprimer le thème « "+themeById(id).name+" » ?"))return;
  LIB=LIB.filter(t=>t.id!==id);
  if(curId===id){curId=null;dirty=true;renderEditorHead();}
  persist();buildLibrary();toast("Thème supprimé");
}
function renameTheme(id){modalMode="rename";modalTarget=id;document.getElementById('m-title').textContent="Renommer le thème";document.getElementById('m-name').value=themeById(id).name;document.getElementById('m-ok').textContent="Renommer";openModal();}


// ── modal ──
function openModal(){document.getElementById('scrim').classList.add('show');setTimeout(()=>document.getElementById('m-name').focus(),40);}
function closeModal(){document.getElementById('scrim').classList.remove('show');}
function confirmModal(){
  const v=document.getElementById('m-name').value.trim()||"Sans nom";
  if(modalMode==="rename"){const t=themeById(modalTarget);if(t){t.name=v;if(curId===t.id)cur.name=v;persist();buildLibrary();renderEditorHead();}}
  else if(modalMode==="saveas"){curId=uid(v);cur.name=v;LIB.push({id:curId,...clone(cur)});dirty=false;persist();buildLibrary();renderEditorHead();toast("Enregistré : "+v);}
  closeModal();
}

// ── divers ──
function setView(v){view=v;document.querySelectorAll('.tabs button').forEach(b=>b.classList.toggle('active',b.dataset.v===v));document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));document.getElementById('view-'+v).classList.add('active');if(v==='library')buildLibrary();}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),1800);}
function resetDemo(){if(confirm("Réinitialiser la maquette (efface thèmes et affectations locaux) ?")){localStorage.removeItem(LS_LIB);seed();loadIntoEditor(LIB[0].id);buildLibrary();toast("Maquette réinitialisée");}}


// ── export / import de la bibliothèque (themes.json) ──
function exportLibrary(){
  const out={schemaVersion:1, themes:LIB.map(t=>({id:t.id,name:t.name,colors:t.colors,fonts:resolveFonts(t.fonts),radius:t.radius,glow:t.glow}))};
  const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download='themes.json';a.click();URL.revokeObjectURL(url);
  toast("themes.json exporté");
}
function resolveFonts(fonts){
  // si la police est une clé du catalogue → stack résolue ; sinon on garde tel quel (déjà une stack)
  const r=k=>FONTS[fonts[k]]||fonts[k];
  return {display:r('display'),body:r('body'),mono:r('mono')};
}
function importLibrary(ev){
  const file=ev.target.files[0]; if(!file) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ const lib=JSON.parse(rd.result); if(!Array.isArray(lib.themes)) throw new Error("format"); LIB=lib.themes; persist(); loadIntoEditor(LIB[0]?LIB[0].id:null); buildLibrary(); toast("Bibliothèque importée ("+LIB.length+" thèmes)"); }catch(e){ alert("Fichier invalide : "+e.message); } };
  rd.readAsText(file); ev.target.value='';
}

// ── init ──
(async()=>{
  await load();
  loadIntoEditor(LIB[0].id);
  renderScreen();
  buildLibrary();
})();

</script>
